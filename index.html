<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 480px;
            height: 640px;
            background: #4a90e2;
            border: 2px solid #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #titleScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #4a90e2;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #titleScreen.hidden {
            display: none;
        }

        .title-text {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
        }

        .bird-sprite {
            font-size: 64px;
            animation: flap-anim 0.6s infinite;
        }

        @keyframes flap-anim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: #ff6b35;
            color: #fff;
            border: 3px solid #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            font-family: 'Courier New', monospace;
        }

        .start-btn:hover {
            background: #ff8c42;
            transform: translate(-2px, -2px);
        }

        .start-btn:active {
            transform: translate(0, 0);
        }

        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        #gameOverScreen.active {
            display: flex;
        }

        .game-over-box {
            background: #000;
            border: 4px solid #fff;
            padding: 40px;
            text-align: center;
        }

        .game-over-title {
            font-size: 36px;
            color: #ff6b35;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            text-shadow: 2px 2px 0 #fff;
        }

        .score-display {
            font-size: 28px;
            color: #ffff00;
            margin: 15px 0;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .best-display {
            font-size: 20px;
            color: #00ff00;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
        }

        .restart-btn {
            padding: 12px 35px;
            font-size: 20px;
            background: #ff6b35;
            color: #fff;
            border: 3px solid #000;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
            font-family: 'Courier New', monospace;
        }

        .restart-btn:hover {
            background: #ff8c42;
            transform: translate(-2px, -2px);
        }

        .restart-btn:active {
            transform: translate(0, 0);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="640"></canvas>

        <div id="titleScreen">
            <div class="title-text">FLAPPY BIRD</div>
            <div class="bird-sprite">🐦</div>
            <button class="start-btn" onclick="startGame()">START</button>
        </div>

        <div id="gameOverScreen">
            <div class="game-over-box">
                <div class="game-over-title">GAME OVER</div>
                <div class="score-display">SCORE: <span id="finalScore">0</span></div>
                <div class="best-display">BEST: <span id="bestScore">0</span></div>
                <button class="restart-btn" onclick="restartGame()">RESTART</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const titleScreen = document.getElementById('titleScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');

        // Pixelated rendering
        ctx.imageSmoothingEnabled = false;

        // Audio Context
        let audioContext = null;

        function initAudio() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {}
            }
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        function playSound(freq, duration) {
            if (!audioContext) {
                initAudio();
                if (!audioContext) return;
            }

            try {
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.frequency.value = freq;
                osc.type = 'sine';

                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                osc.start(now);
                osc.stop(now + duration);
            } catch (e) {}
        }

        function soundFlap() {
            playSound(523, 0.1);
            setTimeout(() => playSound(659, 0.08), 50);
        }

        function soundScore() {
            playSound(880, 0.1);
            setTimeout(() => playSound(1047, 0.1), 80);
            setTimeout(() => playSound(1319, 0.15), 160);
        }

        function soundHit() {
            playSound(200, 0.3);
            setTimeout(() => playSound(150, 0.2), 100);
        }

        // Game constants
        const GRAVITY = 0.6;
        const JUMP_STRENGTH = -12;
        const PIPE_WIDTH = 52;
        const PIPE_GAP = 130;
        const PIPE_SPEED = 4;
        const GROUND_HEIGHT = 80;

        // Game state
        let gameState = {
            score: 0,
            bestScore: parseInt(localStorage.getItem('flappyBestScore')) || 0,
            gameActive: false,
            gameStarted: false,
            frameCount: 0,
            bird: {
                x: 60,
                y: 320,
                width: 34,
                height: 24,
                velocity: 0,
                rotation: 0
            },
            pipes: [],
            groundOffset: 0
        };

        // Draw pixel bird
        function drawBird() {
            ctx.save();
            ctx.translate(gameState.bird.x + gameState.bird.width / 2, gameState.bird.y + gameState.bird.height / 2);
            ctx.rotate(gameState.bird.rotation * Math.PI / 180);
            ctx.translate(-(gameState.bird.width / 2), -(gameState.bird.height / 2));

            // Bird body - yellow
            ctx.fillStyle = '#FFEB3B';
            for (let y = 0; y < gameState.bird.height; y++) {
                for (let x = 0; x < gameState.bird.width; x++) {
                    if (x > 3 && x < gameState.bird.width - 3) {
                        if (y > 2 && y < gameState.bird.height - 2) {
                            ctx.fillRect(x, y, 1, 1);
                        }
                    }
                }
            }

            // Eye
            ctx.fillStyle = '#FFF';
            ctx.fillRect(gameState.bird.width * 0.6, gameState.bird.height * 0.3, 6, 6);
            ctx.fillStyle = '#000';
            ctx.fillRect(gameState.bird.width * 0.63, gameState.bird.height * 0.33, 3, 3);

            // Beak
            ctx.fillStyle = '#FF6B00';
            ctx.fillRect(gameState.bird.width * 0.7, gameState.bird.height * 0.4, 6, 3);

            ctx.restore();
        }

        // Draw pixel pipes
        function drawPipes() {
            ctx.fillStyle = '#52B788';
            gameState.pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);

                // Bottom pipe
                const bottomY = pipe.topHeight + PIPE_GAP;
                ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, canvas.height - GROUND_HEIGHT - bottomY);

                // Pipe highlights
                ctx.fillStyle = '#74D89F';
                ctx.fillRect(pipe.x, pipe.topHeight - 4, PIPE_WIDTH, 4);
                ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, 4);
            });
        }

        // Draw background
        function drawBackground() {
            // Sky
            ctx.fillStyle = '#4A90E2';
            ctx.fillRect(0, 0, canvas.width, canvas.height - GROUND_HEIGHT);

            // Clouds (simple pixel clouds)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            drawPixelCloud(100, 80, 40);
            drawPixelCloud(300, 120, 50);
            drawPixelCloud(400, 100, 45);

            // Ground
            ctx.fillStyle = '#52B788';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);

            // Ground pattern
            ctx.fillStyle = '#4CAF50';
            gameState.groundOffset = (gameState.groundOffset + 2) % 20;
            for (let x = -gameState.groundOffset; x < canvas.width; x += 20) {
                ctx.fillRect(x, canvas.height - GROUND_HEIGHT, 10, 10);
            }

            // Ground line
            ctx.fillStyle = '#2E7D32';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT - 4, canvas.width, 4);
        }

        function drawPixelCloud(x, y, size) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(x + i * size, y, size, size / 2);
            }
        }

        // Draw score
        function drawScore() {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 40px Courier New';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#FFF';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            ctx.fillText(gameState.score, canvas.width / 2, 70);
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // Update game
        function update() {
            if (!gameState.gameActive) return;

            gameState.frameCount++;

            // Physics
            gameState.bird.velocity += GRAVITY;
            if (gameState.bird.velocity > 15) gameState.bird.velocity = 15;
            gameState.bird.y += gameState.bird.velocity;

            // Rotation
            gameState.bird.rotation = Math.min(gameState.bird.velocity * 3, 90);

            // Check collisions
            if (gameState.bird.y + gameState.bird.height >= canvas.height - GROUND_HEIGHT || gameState.bird.y <= 0) {
                endGame();
                return;
            }

            // Spawn pipes
            if (gameState.frameCount % 100 === 0) {
                const topHeight = Math.random() * (canvas.height - PIPE_GAP - 120) + 50;
                gameState.pipes.push({
                    x: canvas.width,
                    topHeight: topHeight,
                    passed: false
                });
            }

            // Update pipes
            for (let i = gameState.pipes.length - 1; i >= 0; i--) {
                const pipe = gameState.pipes[i];
                pipe.x -= PIPE_SPEED;

                // Collision check
                if (gameState.bird.x + gameState.bird.width > pipe.x && gameState.bird.x < pipe.x + PIPE_WIDTH) {
                    if (gameState.bird.y < pipe.topHeight || gameState.bird.y + gameState.bird.height > pipe.topHeight + PIPE_GAP) {
                        endGame();
                        return;
                    }
                }

                // Scoring
                if (!pipe.passed && pipe.x + PIPE_WIDTH < gameState.bird.x) {
                    pipe.passed = true;
                    gameState.score++;
                    soundScore();
                }

                // Remove off-screen pipes
                if (pipe.x < -PIPE_WIDTH) {
                    gameState.pipes.splice(i, 1);
                }
            }
        }

        // Render
        function render() {
            drawBackground();
            drawPipes();
            drawBird();
            drawScore();
        }

        // Game loop
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Start game
        function startGame() {
            initAudio();
            titleScreen.classList.add('hidden');
            gameOverScreen.classList.remove('active');

            gameState.gameActive = true;
            gameState.gameStarted = true;
            gameState.score = 0;
            gameState.bird.y = 320;
            gameState.bird.velocity = 0;
            gameState.pipes = [];
            gameState.frameCount = 0;
        }

        // End game
        function endGame() {
            gameState.gameActive = false;
            soundHit();

            if (gameState.score > gameState.bestScore) {
                gameState.bestScore = gameState.score;
                localStorage.setItem('flappyBestScore', gameState.bestScore);
            }

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('bestScore').textContent = gameState.bestScore;
            gameOverScreen.classList.add('active');
        }

        // Restart
        function restartGame() {
            startGame();
        }

        // Controls
        function flap() {
            if (!gameState.gameStarted) return;
            if (gameState.gameActive) {
                gameState.bird.velocity = JUMP_STRENGTH;
                soundFlap();
            }
        }

        canvas.addEventListener('click', flap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });
        document.addEventListener('touchstart', flap);

        // Initialize
        document.getElementById('bestScore').textContent = gameState.bestScore;
        document.addEventListener('click', initAudio, { once: true });
        gameLoop();
    </script>
</body>
</html>
